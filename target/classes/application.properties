# Server
server.port=8080

# Database (Docker PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/tipsi
spring.datasource.username=ronalyn
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.tipsi=DEBUG

# JWT
app.jwt.secret=your-super-secret-key-change-this-in-production-at-least-32-chars
app.jwt.expiration=86400000

# Application
app.name=Tipsi API
app.version=1.0.0

spring.security.user.name=admin
spring.security.user.password=admin